<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Minifier</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .back-link {
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .header-spacer {
      flex: 1;
    }

    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mode-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      background: none;
      border: none;
      color: var(--text2);
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .mode-btn:hover:not(.active) {
      color: var(--text);
      background: var(--border);
    }

    .separator {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
    }

    .option-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .option-group input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .indent-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    .indent-label {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
    }

    .samples-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .samples-label {
      font-size: 13px;
      color: var(--text2);
    }

    .sample-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .sample-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .main {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel:first-child {
      border-right: 1px solid var(--border);
    }

    .panel-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .panel-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .action-btn.success {
      border-color: var(--green);
      color: var(--green);
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: none;
      color: var(--text);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
      tab-size: 2;
      width: 100%;
    }

    textarea::placeholder {
      color: var(--text2);
      opacity: 0.6;
    }

    .output-area {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .output-placeholder {
      color: var(--text2);
      opacity: 0.6;
      font-style: italic;
    }

    .stats-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .stat-label {
      color: var(--text2);
    }

    .stat-value {
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.yellow {
      color: var(--yellow);
    }

    .stat-value.red {
      color: var(--red);
    }

    .stat-separator {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      padding: 12px 16px;
      margin: 16px;
    }

    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }

      .panel:first-child {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .panel {
        min-height: 300px;
      }

      .samples-group {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="https://yurukusa.github.io/dev-toolkit/">← Dev Toolkit</a>
  <span class="header-title">JS Minifier</span>
</header>

<div class="controls">
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-minify" onclick="setMode('minify')">Minify</button>
    <button class="mode-btn" id="btn-beautify" onclick="setMode('beautify')">Beautify</button>
  </div>

  <div class="separator"></div>

  <div id="minify-options" class="option-group" style="display:flex;gap:12px;flex-wrap:wrap;">
    <label>
      <input type="checkbox" id="opt-shorten-bool" onchange="scheduleProcess()">
      Shorten booleans
    </label>
    <label>
      <input type="checkbox" id="opt-remove-console" onchange="scheduleProcess()">
      Remove console.log
    </label>
  </div>

  <div id="beautify-options" class="option-group" style="display:none;gap:12px;flex-wrap:wrap;">
    <span class="indent-label">Indent:</span>
    <select class="indent-select" id="opt-indent" onchange="scheduleProcess()">
      <option value="2">2 spaces</option>
      <option value="4">4 spaces</option>
      <option value="tab">Tab</option>
    </select>
  </div>

  <div class="samples-group">
    <span class="samples-label">Samples:</span>
    <button class="sample-btn" onclick="loadSample('es6')">ES6 Module</button>
    <button class="sample-btn" onclick="loadSample('react')">React Component</button>
    <button class="sample-btn" onclick="loadSample('node')">Node.js Server</button>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">Input</span>
      <div class="panel-actions">
        <button class="action-btn" onclick="clearInput()">Clear</button>
      </div>
    </div>
    <textarea
      id="input"
      placeholder="Paste your JavaScript here..."
      spellcheck="false"
      autocomplete="off"
      oninput="scheduleProcess()"
    ></textarea>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">Output</span>
      <div class="panel-actions">
        <button class="action-btn" id="btn-copy" onclick="copyOutput()">Copy</button>
        <button class="action-btn" onclick="downloadOutput()">Download</button>
      </div>
    </div>
    <div class="output-area" id="output">
      <span class="output-placeholder">Output will appear here...</span>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item">
    <span class="stat-label">Original:</span>
    <span class="stat-value" id="stat-original">—</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item">
    <span class="stat-label">Output:</span>
    <span class="stat-value" id="stat-output">—</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item">
    <span class="stat-label">Savings:</span>
    <span class="stat-value" id="stat-savings">—</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item">
    <span class="stat-label">Lines:</span>
    <span class="stat-value" id="stat-lines">—</span>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentMode = 'minify';
let debounceTimer = null;
let currentOutput = '';

// ─── Mode Toggle ─────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-minify').classList.toggle('active', mode === 'minify');
  document.getElementById('btn-beautify').classList.toggle('active', mode === 'beautify');
  document.getElementById('minify-options').style.display = mode === 'minify' ? 'flex' : 'none';
  document.getElementById('beautify-options').style.display = mode === 'beautify' ? 'flex' : 'none';
  scheduleProcess();
}

// ─── Debounced Processing ─────────────────────────────────────────────────────
function scheduleProcess() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(process, 200);
}

function process() {
  const input = document.getElementById('input').value;
  if (!input.trim()) {
    setOutput(null);
    updateStats(null, null);
    return;
  }

  try {
    const result = currentMode === 'minify' ? minify(input) : beautify(input);
    currentOutput = result;
    setOutput(result);
    updateStats(input, result);
  } catch (e) {
    setOutput(null, e.message);
  }
}

// ─── Output ───────────────────────────────────────────────────────────────────
function setOutput(text, error) {
  const el = document.getElementById('output');
  if (error) {
    el.innerHTML = `<div class="error-msg">Error: ${escapeHtml(error)}</div>`;
    currentOutput = '';
  } else if (text === null) {
    el.innerHTML = '<span class="output-placeholder">Output will appear here...</span>';
    currentOutput = '';
  } else {
    el.textContent = text;
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats(input, output) {
  const origEl = document.getElementById('stat-original');
  const outEl = document.getElementById('stat-output');
  const savEl = document.getElementById('stat-savings');
  const lineEl = document.getElementById('stat-lines');

  if (!input || !output) {
    origEl.textContent = '—';
    outEl.textContent = '—';
    savEl.textContent = '—';
    lineEl.textContent = '—';
    origEl.className = 'stat-value';
    outEl.className = 'stat-value';
    savEl.className = 'stat-value';
    return;
  }

  const origBytes = new TextEncoder().encode(input).length;
  const outBytes = new TextEncoder().encode(output).length;
  const savedBytes = origBytes - outBytes;
  const savedPct = origBytes > 0 ? ((savedBytes / origBytes) * 100).toFixed(1) : 0;

  const origLines = input.split('\n').length;
  const outLines = output.split('\n').length;

  origEl.textContent = formatBytes(origBytes);
  outEl.textContent = formatBytes(outBytes);

  if (savedBytes > 0) {
    savEl.textContent = `${formatBytes(savedBytes)} (${savedPct}%)`;
    savEl.className = 'stat-value green';
  } else if (savedBytes < 0) {
    savEl.textContent = `+${formatBytes(Math.abs(savedBytes))} (${Math.abs(savedPct)}%)`;
    savEl.className = 'stat-value yellow';
  } else {
    savEl.textContent = '0 bytes (0%)';
    savEl.className = 'stat-value';
  }

  lineEl.textContent = `${origLines} → ${outLines}`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
}

// ─── Minifier ─────────────────────────────────────────────────────────────────
function minify(code) {
  const shortenBool = document.getElementById('opt-shorten-bool').checked;
  const removeConsole = document.getElementById('opt-remove-console').checked;

  // We process token by token to correctly handle strings, template literals, regex
  let result = '';
  let i = 0;
  const len = code.length;

  // Collect preserved important comments separately
  const preservedComments = [];

  while (i < len) {
    const ch = code[i];

    // String literals: single quote
    if (ch === "'") {
      let str = "'";
      i++;
      while (i < len) {
        if (code[i] === '\\') {
          str += code[i] + (code[i + 1] || '');
          i += 2;
        } else if (code[i] === "'") {
          str += "'";
          i++;
          break;
        } else {
          str += code[i++];
        }
      }
      result += str;
      continue;
    }

    // String literals: double quote
    if (ch === '"') {
      let str = '"';
      i++;
      while (i < len) {
        if (code[i] === '\\') {
          str += code[i] + (code[i + 1] || '');
          i += 2;
        } else if (code[i] === '"') {
          str += '"';
          i++;
          break;
        } else {
          str += code[i++];
        }
      }
      result += str;
      continue;
    }

    // Template literals
    if (ch === '`') {
      let str = '`';
      i++;
      let depth = 0;
      while (i < len) {
        if (code[i] === '\\') {
          str += code[i] + (code[i + 1] || '');
          i += 2;
        } else if (code[i] === '$' && code[i + 1] === '{') {
          str += '${';
          i += 2;
          depth++;
        } else if (code[i] === '}' && depth > 0) {
          str += '}';
          i++;
          depth--;
        } else if (code[i] === '`' && depth === 0) {
          str += '`';
          i++;
          break;
        } else {
          str += code[i++];
        }
      }
      result += str;
      continue;
    }

    // Comments
    if (ch === '/' && i + 1 < len) {
      // Single-line comment
      if (code[i + 1] === '/') {
        // Skip to end of line
        while (i < len && code[i] !== '\n') i++;
        continue;
      }

      // Multi-line comment
      if (code[i + 1] === '*') {
        const isImportant = code[i + 2] === '!';
        let comment = '';
        i += 2; // skip /*
        while (i < len) {
          if (code[i] === '*' && code[i + 1] === '/') {
            i += 2;
            break;
          }
          comment += code[i++];
        }
        if (isImportant) {
          // preserve important comment
          result += `/*!${comment}*/`;
        }
        // else: discard
        continue;
      }

      // Regex literal detection — heuristic: after operator, keyword, or open paren
      // Check last non-space char in result
      const lastNonSpace = result.trimEnd().slice(-1);
      const regexPreceding = /[=(:[!&|?{},;+\-*%^~<>]/.test(lastNonSpace) ||
        result.trimEnd() === '' ||
        /\b(return|typeof|instanceof|in|of|delete|void|throw|new|case)\s*$/.test(result);

      if (regexPreceding) {
        let regex = '/';
        i++;
        let inClass = false;
        while (i < len) {
          if (code[i] === '\\') {
            regex += code[i] + (code[i + 1] || '');
            i += 2;
          } else if (code[i] === '[') {
            inClass = true;
            regex += code[i++];
          } else if (code[i] === ']') {
            inClass = false;
            regex += code[i++];
          } else if (code[i] === '/' && !inClass) {
            regex += '/';
            i++;
            // flags
            while (i < len && /[gimsuy]/.test(code[i])) {
              regex += code[i++];
            }
            break;
          } else {
            regex += code[i++];
          }
        }
        result += regex;
        continue;
      }
    }

    // Whitespace collapsing
    if (/\s/.test(ch)) {
      // Collapse any run of whitespace (including newlines) to single space
      // But we need to be careful about operators that need separation
      while (i < len && /\s/.test(code[i])) i++;

      // Only add a space if both sides need it
      const prev = result.slice(-1);
      const next = i < len ? code[i] : '';
      if (needsSpace(prev, next)) {
        result += ' ';
      }
      continue;
    }

    // Semi before closing brace: remove
    if (ch === ';' && i + 1 < len) {
      // look ahead skipping whitespace
      let j = i + 1;
      while (j < len && /\s/.test(code[j])) j++;
      if (code[j] === '}') {
        i++; // skip the semicolon
        continue;
      }
    }

    result += ch;
    i++;
  }

  // Post-process: shorten booleans
  if (shortenBool) {
    result = result.replace(/\btrue\b/g, '!0').replace(/\bfalse\b/g, '!1');
  }

  // Remove console.log statements
  if (removeConsole) {
    // Match console.log(...) possibly with semicolon — careful not to break chained calls
    result = result.replace(/\bconsole\s*\.\s*log\s*\([^)]*\)\s*;?/g, '');
  }

  return result.trim();
}

function needsSpace(prev, next) {
  if (!prev || !next) return false;
  const isIdentOrKeywordChar = c => /[a-zA-Z0-9_$]/.test(c);
  // Space needed between two identifier/keyword chars
  if (isIdentOrKeywordChar(prev) && isIdentOrKeywordChar(next)) return true;
  // Space needed to avoid merging operators like > > into >> etc.
  if (/[+\-]/.test(prev) && prev === next) return true;
  return false;
}

// ─── Beautifier ──────────────────────────────────────────────────────────────
function beautify(code) {
  const indentVal = document.getElementById('opt-indent').value;
  const INDENT = indentVal === 'tab' ? '\t' : ' '.repeat(parseInt(indentVal));

  let result = '';
  let indentLevel = 0;
  let i = 0;
  const len = code.length;

  function getIndent() {
    return INDENT.repeat(indentLevel);
  }

  function addNewline() {
    result = result.trimEnd();
    result += '\n';
  }

  function addIndentedNewline() {
    addNewline();
    result += getIndent();
  }

  // We'll do a simpler approach: normalize whitespace then re-indent
  // First pass: collect tokens preserving strings/comments
  const tokens = tokenize(code);

  let depth = 0;
  let lastTok = '';

  function currentLine() {
    const lines = result.split('\n');
    return lines[lines.length - 1];
  }

  function appendLine(line) {
    if (result.length > 0 && !result.endsWith('\n')) {
      result += '\n';
    }
    if (line.trim()) {
      result += INDENT.repeat(depth) + line.trim();
    }
  }

  // Split into logical lines by semicolons and braces
  let buf = '';
  const lines = [];

  for (let t = 0; t < tokens.length; t++) {
    const tok = tokens[t];

    if (tok.type === 'whitespace') continue;

    if (tok.type === 'newline') continue;

    if (tok.value === '{') {
      if (buf.trim()) lines.push({ text: buf.trim(), type: 'stmt' });
      buf = '';
      lines.push({ text: '{', type: 'open' });
    } else if (tok.value === '}') {
      if (buf.trim()) lines.push({ text: buf.trim(), type: 'stmt' });
      buf = '';
      lines.push({ text: '}', type: 'close' });
    } else if (tok.value === ';') {
      buf += ';';
      lines.push({ text: buf.trim(), type: 'stmt' });
      buf = '';
    } else {
      // Add space before token if needed
      if (buf.length > 0) {
        const last = buf.slice(-1);
        const curr = tok.value[0];
        if (needsBeautifySpace(last, curr)) {
          buf += ' ';
        }
      }
      buf += tok.value;
    }
  }

  if (buf.trim()) lines.push({ text: buf.trim(), type: 'stmt' });

  // Render lines
  result = '';
  for (let l = 0; l < lines.length; l++) {
    const line = lines[l];
    if (line.type === 'open') {
      if (result.length > 0 && !result.endsWith('\n')) result += ' ';
      else if (result.length > 0) result += INDENT.repeat(depth);
      result += '{\n';
      depth++;
    } else if (line.type === 'close') {
      depth = Math.max(0, depth - 1);
      result += INDENT.repeat(depth) + '}\n';
    } else {
      result += INDENT.repeat(depth) + line.text + '\n';
    }
  }

  return result.trim();
}

function needsBeautifySpace(prev, next) {
  if (!prev || !next) return false;
  const isWord = c => /[a-zA-Z0-9_$]/.test(c);
  if (isWord(prev) && isWord(next)) return true;
  if (isWord(prev) && /[({]/.test(next)) return false; // fn(  → no space added here
  if (/[=+\-*/<>!&|^%?:,]/.test(prev) || /[=+\-*/<>!&|^%?:,]/.test(next)) return true;
  return false;
}

function tokenize(code) {
  const tokens = [];
  let i = 0;
  const len = code.length;

  while (i < len) {
    const ch = code[i];

    // Whitespace
    if (ch === ' ' || ch === '\t' || ch === '\r') {
      let ws = '';
      while (i < len && (code[i] === ' ' || code[i] === '\t' || code[i] === '\r')) {
        ws += code[i++];
      }
      tokens.push({ type: 'whitespace', value: ws });
      continue;
    }

    // Newline
    if (ch === '\n') {
      tokens.push({ type: 'newline', value: '\n' });
      i++;
      continue;
    }

    // Single-line comment
    if (ch === '/' && code[i + 1] === '/') {
      let comment = '';
      while (i < len && code[i] !== '\n') comment += code[i++];
      tokens.push({ type: 'comment_line', value: comment });
      continue;
    }

    // Multi-line comment
    if (ch === '/' && code[i + 1] === '*') {
      let comment = '/*';
      i += 2;
      while (i < len) {
        if (code[i] === '*' && code[i + 1] === '/') {
          comment += '*/';
          i += 2;
          break;
        }
        comment += code[i++];
      }
      tokens.push({ type: 'comment_block', value: comment });
      continue;
    }

    // String single quote
    if (ch === "'") {
      let str = "'";
      i++;
      while (i < len) {
        if (code[i] === '\\') { str += code[i] + (code[i + 1] || ''); i += 2; }
        else if (code[i] === "'") { str += "'"; i++; break; }
        else str += code[i++];
      }
      tokens.push({ type: 'string', value: str });
      continue;
    }

    // String double quote
    if (ch === '"') {
      let str = '"';
      i++;
      while (i < len) {
        if (code[i] === '\\') { str += code[i] + (code[i + 1] || ''); i += 2; }
        else if (code[i] === '"') { str += '"'; i++; break; }
        else str += code[i++];
      }
      tokens.push({ type: 'string', value: str });
      continue;
    }

    // Template literal
    if (ch === '`') {
      let str = '`';
      i++;
      while (i < len) {
        if (code[i] === '\\') { str += code[i] + (code[i + 1] || ''); i += 2; }
        else if (code[i] === '`') { str += '`'; i++; break; }
        else str += code[i++];
      }
      tokens.push({ type: 'template', value: str });
      continue;
    }

    // Single-char tokens
    tokens.push({ type: 'char', value: ch });
    i++;
  }

  return tokens;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function clearInput() {
  document.getElementById('input').value = '';
  setOutput(null);
  updateStats(null, null);
  currentOutput = '';
}

function copyOutput() {
  if (!currentOutput) return;
  navigator.clipboard.writeText(currentOutput).then(() => {
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('success');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('success');
    }, 1500);
  });
}

function downloadOutput() {
  if (!currentOutput) return;
  const blob = new Blob([currentOutput], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentMode === 'minify' ? 'output.min.js' : 'output.js';
  a.click();
  URL.revokeObjectURL(url);
}

'use strict';

const http = require('http');
const url = require('url');
const fs = require('fs');
const path = require('path');

/* Server configuration */
const PORT = process.env.PORT || 3000;
const HOST = process.env.HOST || 'localhost';

// MIME types for static files
const MIME_TYPES = {
  '.html': 'text/html',
  '.js': 'application/javascript',
  '.css': 'text/css',
  '.json': 'application/json',
  '.png': 'image/png',
};

/**
 * Handle incoming HTTP requests
 * @param {http.IncomingMessage} req
 * @param {http.ServerResponse} res
 */
function requestHandler(req, res) {
  // Log every request
  console.log(\`[\${new Date().toISOString()}] \${req.method} \${req.url}\`);

  const parsedUrl = url.parse(req.url, true);
  const pathname = parsedUrl.pathname;

  // CORS headers
  res.setHeader('Access-Control-Allow-Origin', '*');
  res.setHeader('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE');

  // Handle API routes
  if (pathname.startsWith('/api/')) {
    handleApi(pathname, parsedUrl.query, req, res);
    return;
  }

  // Serve static files
  const filePath = path.join(__dirname, 'public', pathname === '/' ? 'index.html' : pathname);
  const ext = path.extname(filePath);
  const contentType = MIME_TYPES[ext] || 'application/octet-stream';

  fs.readFile(filePath, (err, data) => {
    if (err) {
      if (err.code === 'ENOENT') {
        res.writeHead(404, { 'Content-Type': 'text/plain' });
        res.end('404 Not Found');
      } else {
        /* Internal server error */
        console.error('File read error:', err);
        res.writeHead(500, { 'Content-Type': 'text/plain' });
        res.end('500 Internal Server Error');
      }
      return;
    }
    res.writeHead(200, { 'Content-Type': contentType });
    res.end(data);
  });
}

function handleApi(pathname, query, req, res) {
  // Simple JSON API handler
  const routes = {
    '/api/health': () => ({ status: 'ok', uptime: process.uptime() }),
    '/api/time': () => ({ timestamp: Date.now(), iso: new Date().toISOString() }),
  };

  const handler = routes[pathname];
  if (handler) {
    const data = handler();
    res.writeHead(200, { 'Content-Type': 'application/json' });
    res.end(JSON.stringify(data, null, 2));
  } else {
    res.writeHead(404, { 'Content-Type': 'application/json' });
    res.end(JSON.stringify({ error: 'Route not found' }));
  }
}

// Create and start server
const server = http.createServer(requestHandler);

server.on('error', (err) => {

});

server.listen(PORT, HOST, () => {
